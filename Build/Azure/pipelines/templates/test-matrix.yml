# ClickHouse
# All three ClickHouse providers (Driver/MySql/Octonica) target one server on separate
# databases (testdb1/2/3), so they run as concurrent lanes in a single job without contention.
        - name: ClickHouse
          title: ClickHouse (all providers)
          config_linux: clickhouse
          config_macos: clickhouse
          script_linux_global: clickhouse.sh
          script_macos_global: clickhouse.sh
          install_docker_macos: true
          enable_os_windows: false
          enable_os_ubuntu: true
          enable_os_macos: true
          enable_fw_netfx: false
          enable_fw_net80: true
          enable_fw_net90: true
          enable_fw_net100: true
          ${{ if or(contains(parameters.db_filter, '[all]'), contains(parameters.db_filter, '[clickhouse.all]')) }}:
            enabled: true
          ${{ if not(or(contains(parameters.db_filter, '[all]'), contains(parameters.db_filter, '[clickhouse.all]'))) }}:
            enabled: false

# DuckDB
        - name: DuckDB
          title: DuckDB
          config_win: duckdb
          config_linux: duckdb
          config_macos: duckdb
          # DuckDB has no netfx-only tests -> its Windows run is redundant with Linux.
          # Run the Windows job on full (release) runs only; regular PR runs cover it on Linux.
          ${{ if eq(parameters.full_run, true) }}:
            enable_os_windows: true
          ${{ if not(eq(parameters.full_run, true)) }}:
            enable_os_windows: false
          enable_os_ubuntu: true
          enable_os_macos: true
          enable_fw_netfx: false
          enable_fw_net80: true
          enable_fw_net90: true
          enable_fw_net100: true
          ${{ if or(contains(parameters.db_filter, '[all]'), contains(parameters.db_filter, '[duckdb.all]')) }}:
            enabled: true
          ${{ if not(or(contains(parameters.db_filter, '[all]'), contains(parameters.db_filter, '[duckdb.all]'))) }}:
            enabled: false

# YDB
        - name: YDB
          title: YDB
          config_linux: ydb
          config_macos: ydb
          script_linux_global: ydb.sh
          script_macos_global: ydb.sh
          install_docker_macos: true
          enable_os_windows: false
          enable_os_ubuntu: true
          enable_os_macos: true
          enable_fw_netfx: false
          enable_fw_net80: true
          enable_fw_net90: true
          enable_fw_net100: true
          ${{ if or(contains(parameters.db_filter, '[all]'), contains(parameters.db_filter, '[ydb.all]')) }}:
            enabled: true
          ${{ if not(or(contains(parameters.db_filter, '[all]'), contains(parameters.db_filter, '[ydb.all]'))) }}:
            enabled: false
