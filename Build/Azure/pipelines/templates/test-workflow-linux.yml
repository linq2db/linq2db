parameters:
  with_baselines: false

steps:
- checkout: none

# .NET 8 SDK already installed https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2204-Readme.md
# but we still need to install all required versions because only last installed available due to bug

# https://github.com/apache/flink/blob/master/tools/azure-pipelines/free_disk_space.sh
# when more space needed, uncomment more lines
- task: CmdLine@2
  inputs:
    script: |
      # Free disk space so large-DB jobs (Oracle 21/23) fit. Each step logs the space it
      # actually freed (avail before -> after); the ~sizes below are measured on build 22224.
      #
      # Enabled (each frees >= 1 GB): ~23.6 GB total, takes avail from ~15 GB to ~39 GB.
      # Disabled (freed < 1 GB, or unsafe) - uncomment if a job needs more headroom:
      #   apt clean      ~0.1 GB
      #   remove dotnet  ~2-3 GB  (breaks all legs - system dotnet is used before UseDotNet@2)
      avail() { df --output=avail -m / | tail -1 | tr -d ' '; }
      report() { local a=$(avail); echo ">>> $2: freed $(( a - $1 )) MB (avail now $a MB)"; }

      b=$(avail); sudo apt-get remove -y '^llvm-.*';        report $b "remove llvm (~1.4Gb)"
      b=$(avail); sudo rm -rf /usr/local/lib/android;       report $b "remove android (~10Gb)"
      b=$(avail); sudo rm -rf /usr/local/.ghcup/;           report $b "remove ghcup (~3.7Gb)"
      b=$(avail); sudo rm -rf /opt/hostedtoolcache/CodeQL;  report $b "remove CodeQL (~1.7Gb, unused)"
      b=$(avail); sudo rm -rf /usr/share/swift;             report $b "remove swift (~3.4Gb, unused)"
      b=$(avail); sudo rm -rf /usr/lib/jvm;                 report $b "remove jvm (~1.4Gb, unused)"
      # docker image prune runs before any DB container exists (safe); it also prints its own
      # "Total reclaimed space" line in addition to the avail delta below.
      b=$(avail); sudo docker image prune -af;              report $b "docker image prune (~1.9Gb)"
      df -h /
      # Disabled - freed < 1 GB or breaks legs; uncomment if a job needs more space:
      # b=$(avail); sudo apt-get clean;                     report $b "apt clean (~0.1Gb)"
      # b=$(avail); sudo rm -rf /usr/share/dotnet;          report $b "remove dotnet (~2-3Gb est)"
  displayName: Cleanup Junk

- task: DownloadPipelineArtifact@2
  inputs:
    artifactName: $(artifact_test_scripts)
    targetPath: '$(System.DefaultWorkingDirectory)/scripts'
  condition: and(variables.title, succeeded())
  displayName: Extract test scripts

# Re-create the baselines branch if a previous completed run deleted it (empty-branch
# cleanup). Without this, a "rerun failed jobs" restart fails on the clone below because
# create_baselines_branch is not re-run on a partial restart. See build 21555.
- task: PowerShell@2
  inputs:
    pwsh: true
    filePath: '$(System.DefaultWorkingDirectory)/scripts/ensure-baselines-branch.ps1'
    arguments: -Branch "$(baselines_branch)" -BaselinesMaster "$(baselines_master)" -BaseHash "$(baselines_head)"
    workingDirectory: '$(System.DefaultWorkingDirectory)'
  displayName: Ensure test baselines branch
  condition: and(variables.title, ${{ parameters.with_baselines }}, succeeded())
  env:
    GITHUB_TOKEN: $(BASELINES_GH_PAT)

- task: CmdLine@2
  inputs:
    script: 'git clone https://$(BASELINES_GH_PAT)@github.com/linq2db/linq2db.baselines.git baselines && cd baselines && git checkout -b $(baselines_branch) origin/$(baselines_branch) && cd ..'
    workingDirectory: '$(System.DefaultWorkingDirectory)'
  displayName: Checkout test baselines
  condition: and(variables.title, ${{ parameters.with_baselines }}, succeeded())

- task: DownloadPipelineArtifact@2
  inputs:
    artifactName: $(artifact_test_configs)
    targetPath: '$(System.DefaultWorkingDirectory)/configs'
  condition: and(variables.title, succeeded())
  displayName: Extract test configs

- task: DownloadPipelineArtifact@2
  inputs:
    artifactName: $(artifact_test_net80_binaries)
    targetPath: '$(System.DefaultWorkingDirectory)/net8.0'
  condition: and(variables.title, eq(variables.net80, 'true'), succeeded())
  displayName: Extract NET 8 test binaries

- task: CmdLine@2
  inputs:
    script: 'cp $(System.DefaultWorkingDirectory)/configs/net80/$(config).json net8.0/UserDataProviders.json'
    workingDirectory: '$(System.DefaultWorkingDirectory)'
  displayName: Copy .NET 8 test config
  condition: and(variables.title, eq(variables.net80, 'true'), succeeded())

- task: CmdLine@2
  inputs:
    script: 'chmod +x $(script_global)'
    workingDirectory: '$(System.DefaultWorkingDirectory)/scripts'
  condition: and(variables.title, variables.script_global, succeeded())
  displayName: Mark script as executable

- task: CmdLine@2
  inputs:
    script: 'chmod +x $(script_local)'
    workingDirectory: '$(System.DefaultWorkingDirectory)/scripts'
  condition: and(variables.title, variables.script_local, succeeded())
  displayName: Mark script as executable

- task: CmdLine@2
  inputs:
    script: '$(System.DefaultWorkingDirectory)/scripts/$(script_global)'
    workingDirectory: '$(System.DefaultWorkingDirectory)/scripts'
  condition: and(variables.title, variables.script_global, succeeded())
  displayName: Setup tests

- task: UseDotNet@2
  displayName: 'Use .NET 8'
  inputs:
    packageType: sdk
    version: 8.x
  condition: and(variables.title, eq(variables.net80, 'true'), succeeded())

- task: CmdLine@2
  inputs:
    script: '$(System.DefaultWorkingDirectory)/scripts/$(script_local)'
    workingDirectory: '$(System.DefaultWorkingDirectory)/net8.0/main/x64'
  condition: and(variables.title, variables.script_local, eq(variables.net80, 'true'), succeeded())
  displayName: Setup .NET 8 tests

- script: dotnet ./net8.0/main/x64/linq2db.Tests.dll --filter "TestCategory != SkipCI" --settings ./net8.0/main/x64/.runsettings --report-trx --report-trx-filename net8.0-main-x64.trx --results-directory TestResults --hangdump --hangdump-timeout 5m
  condition: and(variables.title, eq(variables.net80, 'true'), succeeded(), ne(variables.retry, 'true'), ${{ parameters.full_run }})
  displayName: 'Tests (.NET 8): $(title)'

- script: dotnet ./net8.0/main/x64/linq2db.Tests.dll --filter "TestCategory != SkipCI" --settings ./net8.0/main/x64/.runsettings --report-trx --report-trx-filename net8.0-main-x64.trx --results-directory TestResults --hangdump --hangdump-timeout 5m $(test_retry_args)
  condition: and(variables.title, eq(variables.net80, 'true'), succeeded(), eq(variables.retry, 'true'), ${{ parameters.full_run }})
  displayName: 'Tests (.NET 8): $(title)'
  retryCountOnTaskFailure: 2

- script: dotnet ./net8.0/efcore/x64/linq2db.EntityFrameworkCore.Tests.dll --filter "TestCategory != SkipCI" --settings ./net8.0/efcore/x64/.runsettings --report-trx --report-trx-filename net8.0-efcore-x64.trx --results-directory TestResults --hangdump --hangdump-timeout 5m
  condition: and(variables.title, eq(variables.net80, 'true'), succeeded())
  displayName: 'EF.Core Tests (.NET 8): $(title)'

- task: CmdLine@2
  inputs:
    script: rm -rf $(System.DefaultWorkingDirectory)/net8.0
  displayName: Remove NET 8 test binaries
  condition: and(variables.title, eq(variables.net80, 'true'))

- task: DownloadPipelineArtifact@2
  inputs:
    artifactName: $(artifact_test_net90_binaries)
    targetPath: '$(System.DefaultWorkingDirectory)/net9.0'
  condition: and(variables.title, eq(variables.net90, 'true'), succeeded())
  displayName: Extract NET 9 test binaries

- task: CmdLine@2
  inputs:
    script: 'cp $(System.DefaultWorkingDirectory)/configs/net90/$(config).json net9.0/UserDataProviders.json'
    workingDirectory: '$(System.DefaultWorkingDirectory)'
  displayName: Copy .NET 9 test config
  condition: and(variables.title, eq(variables.net90, 'true'), succeeded())

- task: UseDotNet@2
  displayName: 'Use .NET 9'
  inputs:
    packageType: sdk
    version: 9.x
  condition: and(variables.title, eq(variables.net90, 'true'), succeeded())

- task: CmdLine@2
  inputs:
