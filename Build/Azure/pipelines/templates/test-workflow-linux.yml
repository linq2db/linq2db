  inputs:
    artifactName: $(artifact_test_net100_binaries)
    targetPath: '$(System.DefaultWorkingDirectory)/net10.0'
  condition: and(variables.title, eq(variables.net100, 'true'), succeeded())
  displayName: Extract NET 10 test binaries

- task: CmdLine@2
  inputs:
    script: 'cp $(System.DefaultWorkingDirectory)/configs/net100/$(config).json net10.0/UserDataProviders.json'
    workingDirectory: '$(System.DefaultWorkingDirectory)'
  displayName: Copy .NET 10 test config
  condition: and(variables.title, eq(variables.net100, 'true'), succeeded())

- task: UseDotNet@2
  displayName: 'Use .NET 10'
  inputs:
    packageType: sdk
    version: 10.x
  condition: and(variables.title, eq(variables.net100, 'true'), succeeded())

- task: CmdLine@2
  inputs:
    script: '$(System.DefaultWorkingDirectory)/scripts/$(script_local)'
    workingDirectory: '$(System.DefaultWorkingDirectory)/net10.0/main/x64'
  condition: and(variables.title, variables.script_local, eq(variables.net100, 'true'), succeeded())
  displayName: Setup .NET 10 tests

- script: dotnet ./net10.0/main/x64/linq2db.Tests.dll --filter "TestCategory != SkipCI" --settings ./net10.0/main/x64/.runsettings --report-trx --report-trx-filename net10.0-main-x64.trx --results-directory TestResults --hangdump --hangdump-timeout 5m
  condition: and(variables.title, eq(variables.net100, 'true'), succeeded(), ne(variables.retry, 'true'))
  displayName: 'Tests (.NET 10): $(title)'

- script: dotnet ./net10.0/main/x64/linq2db.Tests.dll --filter "TestCategory != SkipCI" --settings ./net10.0/main/x64/.runsettings --report-trx --report-trx-filename net10.0-main-x64.trx --results-directory TestResults --hangdump --hangdump-timeout 5m $(test_retry_args)
  condition: and(variables.title, eq(variables.net100, 'true'), succeeded(), eq(variables.retry, 'true'))
  displayName: 'Tests (.NET 10): $(title)'
